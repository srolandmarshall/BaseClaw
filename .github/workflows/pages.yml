name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mcp-apps/ui/**'
      - 'mcp-apps/preview.html'
      - 'mcp-apps/vite.preview.build.config.ts'
      - 'mcp-apps/package.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-apps/package-lock.json

      - name: Install dependencies
        working-directory: mcp-apps
        run: npm ci

      - name: Build Pages
        working-directory: mcp-apps
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mcp-apps/dist/preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
