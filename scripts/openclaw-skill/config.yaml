# Yahoo Fantasy Baseball — Automation Configuration
# Autonomy levels: auto | suggest | alert | off
# - auto: Execute action automatically, send confirmation
# - suggest: Send recommendation, wait for confirmation before acting
# - alert: Send alert only, do not recommend specific actions
# - off: Disabled

actions:
  daily_lineup:
    autonomy: suggest
    schedule: "0 10 * * *"  # 10:00 AM daily
    description: "Set optimal daily lineup"

  injury_response:
    autonomy: alert
    check_interval: 3600  # seconds
    description: "Respond to IL placements"

  waiver_scout:
    autonomy: suggest
    schedule: "0 6 * * *"  # 6:00 AM daily
    description: "Scan for valuable free agents"

  weekly_recap:
    autonomy: auto
    schedule: "0 20 * * 0"  # Sunday 8 PM
    description: "Generate weekly recap narrative"

  streaming_pitcher:
    autonomy: suggest
    schedule: "0 9 * * *"  # 9:00 AM daily
    description: "Find best streaming pitcher for today"

# Notification preferences
notifications:
  enabled: true
  channel: telegram  # telegram | whatsapp | stdout
  min_priority: medium  # low | medium | high | critical

# League settings
league:
  api_url: "http://localhost:8766"
  team_id: ""  # auto-detected from OAuth
